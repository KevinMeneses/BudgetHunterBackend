# Production Profile Configuration
# Activate this profile by setting: spring.profiles.active=production
# Or via environment variable: SPRING_PROFILES_ACTIVE=production
# Or via command line: --spring.profiles.active=production

# PostgreSQL Database Configuration
# IMPORTANT: Override these values using environment variables in production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# Connection Pool Configuration (HikariCP - default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA/Hibernate Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# IMPORTANT: Use 'validate' in production after initial setup
# For first deployment, use 'update' to create tables, then switch to 'validate'
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 Console (security)
spring.h2.console.enabled=false

# Production Logging Configuration
logging.level.com.budgethunter=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN

# JWT Configuration
# IMPORTANT: Override jwt.secret with a secure random value in production
jwt.secret=${JWT_SECRET:budgethunter-production-secret-key-CHANGE-THIS-IN-PRODUCTION-minimum-256-bits-required}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Production Server Configuration
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never

# Rate Limiting (enabled in production profile - see RateLimitConfig.kt)
# Default: 100 requests per minute per IP
# Configure in RateLimitConfig.kt if customization is needed
