# BudgetHunter Backend - Spring Boot Configuration
spring.application.name=budgethunter-backend
server.port=8080

# ============================================
# ACTIVE PROFILE CONFIGURATION
# ============================================
# Available profiles:
#   - debug: Local development with H2 in-memory database, rate limiting disabled
#   - production: Production deployment with PostgreSQL, rate limiting enabled
#
# To switch profiles:
#   1. Change the active profile below, OR
#   2. Set environment variable: SPRING_PROFILES_ACTIVE=production, OR
#   3. Use command line argument: --spring.profiles.active=production
# ============================================

spring.profiles.active=production

# Disable Open Session In View to prevent transaction leaks in streaming endpoints
spring.jpa.open-in-view=false

# Profile-specific configurations are in:
#   - application-debug.properties (H2 database, verbose logging, H2 console enabled)
#   - application-production.properties (PostgreSQL, secure logging, rate limiting enabled)
