# Debug/Development Profile Configuration
# Activate this profile by setting: spring.profiles.active=debug (default)
# This profile is optimized for local development and testing

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:budgethunter
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Development Logging Configuration
logging.level.com.budgethunter=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# JWT Configuration (development values)
jwt.secret=budgethunter-secret-key-for-jwt-token-generation-minimum-256-bits
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Development Server Configuration
server.error.include-message=always
server.error.include-stacktrace=always

# Rate Limiting (disabled in debug profile - see RateLimitConfig.kt)

# Actuator Configuration (Development)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
# Group health indicators for organized output
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=db,diskSpace
