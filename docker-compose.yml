services:
  postgres:
    image: postgres:16-alpine
    container_name: budgethunter-postgres
    environment:
      POSTGRES_DB: budgethunter
      POSTGRES_USER: budgethunter_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgethunter_user -d budgethunter"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - budgethunter-network

  backend:
    image: eclipse-temurin:17-jre
    container_name: budgethunter-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      DATABASE_URL: jdbc:postgresql://postgres:5432/budgethunter
      DATABASE_USERNAME: budgethunter_user
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    volumes:
      - ./app.jar:/app/app.jar:ro
      - ./logs:/app/logs
    working_dir: /app
    command: ["java", "-jar", "/app/app.jar"]
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - budgethunter-network

volumes:
  postgres_data:
    driver: local

networks:
  budgethunter-network:
    driver: bridge
